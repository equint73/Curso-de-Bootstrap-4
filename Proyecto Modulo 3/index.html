<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyecto Modulo 3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Carousel -->
<div id="carouselMain" class="carousel slide mb-5" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/carousel/img1.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="img/carousel/img2.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="img/carousel/img3.jpg" class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselMain" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselMain" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<div class="container">
  <!-- Tabs / Pills -->
  <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="tab1" data-bs-toggle="pill" data-bs-target="#opcion1">Tarjeta</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab2" data-bs-toggle="pill" data-bs-target="#opcion2">Efectivo</button>
    </li>
  </ul>
  <div class="tab-content">
    <div class="tab-pane fade show active" id="opcion1">Paga con tarjeta Visa/MasterCard.</div>
    <div class="tab-pane fade" id="opcion2">Paga en efectivo en tiendas autorizadas.</div>
  </div>

  <!-- Collapse y Multi-Collapse -->
  <p class="mt-5">
    <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#info1">Ver detalles</button>
    <button class="btn btn-secondary" data-bs-toggle="collapse" data-bs-target=".multi-collapse">Ver todo</button>
  </p>
  <div class="row">
    <div class="col">
      <div class="collapse multi-collapse" id="info1">
        <div class="card card-body">Detalle individual</div>
      </div>
    </div>
    <div class="col">
      <div class="collapse multi-collapse" id="info2">
        <div class="card card-body">Otro detalle</div>
      </div>
    </div>
  </div>

  <!-- Accordion -->
  <div class="accordion my-5" id="accordionPagos">
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
          Tarjeta de Crédito
        </button>
      </h2>
      <div id="collapseOne" class="accordion-collapse collapse show">
        <div class="accordion-body">Aceptamos todas las tarjetas principales.</div>
      </div>
    </div>
  </div>

  <!-- Card con Tooltip -->
  <div class="card mb-5" data-bs-toggle="tooltip" data-bs-placement="top" title="Haz clic para más info">
    <div class="card-body">
      <h5 class="card-title">Producto X</h5>
      <p class="card-text">Descripción breve.</p>
    </div>
  </div>

  <!-- Botón que abre Modal -->
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#registroModal">
    Registrarse
  </button>
</div>

<!-- Modal con formulario -->
<div class="modal fade" id="registroModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form>
        <div class="modal-header">
          <h5 class="modal-title">Registro</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control">
          </div>
          <div class="mb-3">
            <label for="emailModal" class="form-label">Email</label>
            <input type="email" id="emailModal" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="node_modules/jquery/dist/jquery.min.js"></script>
<script src="node_modules/popper.js/dist/umd/popper.min.js"></script>
<script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
