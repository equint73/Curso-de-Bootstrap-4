<div class="container mt-5 pt-5">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
      <li class="breadcrumb-item active">Contacto</li>
    </ol>
  </nav>

  <h2>Contáctanos</h2>
  <form class="mt-4">
    <div class="mb-3">
      <label for="email" class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" id="email">
    </div>

    <div class="mb-3">
      <label for="servicio" class="form-label">Servicio de interés</label>
      <select class="form-select" id="servicio">
        <option>Soporte</option>
        <option>Compra</option>
        <option>Suscripción</option>
      </select>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="infoCheck">
      <label class="form-check-label" for="infoCheck">Quiero recibir más información</label>
    </div>

    <div class="mb-3">
      <label for="comentario" class="form-label">Comentario</label>
      <textarea class="form-control" id="comentario" rows="3"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Enviar</button>
  </form>
</div>
