<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tienda de Bootstrap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="node_modules/open-iconic/font/css/open-iconic-bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar fija -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <a class="navbar-brand" href="#">Tienda</a>
  <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
      <li class="nav-item"><a class="nav-link" href="productos.html">Productos</a></li>
      <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
    </ul>
  </div>
</nav>

<!-- Banner -->
<div class="container mt-5 pt-5">
  <div class="mb-4">
    <img src="img/banner.jpg" class="img-fluid w-100" alt="Promoción Especial">
  </div>

  <!-- Breadcrumbs -->
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item active">Inicio</li>
    </ol>
  </nav>

  <!-- Productos (cards) -->
  <div class="row">
    <div class="col-md-4">
      <div class="card mb-4">
        <img src="img/productos/producto1.jpg" class="card-img-top" alt="Producto 1">
        <div class="card-body">
          <h5 class="card-title">Producto 1</h5>
          <p class="card-text">Descripción del producto.</p>
        </div>
        <div class="card-footer text-center">
          <button class="btn btn-primary">Comprar</button>
        </div>
      </div>
    </div>
    <!-- + 2 más iguales -->
  </div>
</div>

<!-- Footer -->
<footer class="bg-light py-3 text-center mt-5">
  <p>&copy; 2026 Tienda Bootstrap</p>
</footer>

<script src="node_modules/jquery/dist/jquery.min.js"></script>
<script src="node_modules/popper.js/dist/umd/popper.min.js"></script>
<script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</body>
</html>
